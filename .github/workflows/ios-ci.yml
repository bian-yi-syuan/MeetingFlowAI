name: iOS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project MeetingFlowAI.xcodeproj \
            -scheme MeetingFlowAI \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/MeetingFlowAI-DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Unit tests
        run: |
          set -euo pipefail
          DEVICE_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')"
          if [[ -z "$DEVICE_ID" ]]; then
            echo "No available iPhone Simulator was found."
            exit 1
          fi
          xcodebuild \
            -project MeetingFlowAI.xcodeproj \
            -scheme MeetingFlowAI \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -derivedDataPath "$RUNNER_TEMP/MeetingFlowAI-TestDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            test
